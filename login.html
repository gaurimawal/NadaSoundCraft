<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - Nada Soundcraft</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="utility.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <!-- HCI: Consistency (Standard Header) -->
    <header class="global-header">
        <div class="header-content">
            <div class="logo"><a href="index.html">Nada Soundcraft</a></div>
            <nav class="main-nav">
                <a href="category.html" class="nav-link">Tata Vadya</a>
                <a href="category.html" class="nav-link">Sushira Vadya</a>
                <a href="category.html" class="nav-link">Avanaddha Vadya</a>
                 <a href="category.html" class="nav-link">Ghana Vadya</a>
                <a href="category.html" class="nav-link">Accessories</a>
                <a href="artist.html" class="nav-link">Artists</a> 
            </nav>
            <div class="header-actions">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                </div>
                <a href="profile.html" class="icon-link" aria-label="User Profile"><i class="fas fa-user"></i></a>
                <a href="cart.html" class="icon-link cart-link" aria-label="Shopping Cart"> 
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>

    <main class="login-page">
        <div class="login-container">
            <!-- HCI: Closure (Clear title for the current step) -->
            <h1 class="login-title">Log In to Your Account</h1>
            
            <form class="login-form" action="index.html" method="get"> 
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <div class="form-options">
                    <label for="remember">
                        <input type="checkbox" id="remember">
                        Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a> 
                </div>
                <!-- HCI: Consistency (Standard CTA style) -->
                <button type="submit" class="login-btn">Log In Securely</button>
            </form>
            <p class="signup-link">New customer? <a href="#" style="font-weight: bold;">Create an account</a></p>
        </div>
    </main>

    <!-- HCI: Consistency (Standard Footer) -->
    <footer class="site-footer">
        <p>&copy; 2025 Nada Soundcraft. All Rights Reserved. | <a href="#" style="color:var(--color-text-accent);">Privacy Policy</a></p>
    </footer>

</body>
</html>
